services:
  docs:
    image: tesys_tagboard_local_docs
    container_name: tesys_tagboard_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - path: ./.envs/.local/.django.example
        required: true
      - path: ./.envs/.local/.django
        required: false
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./tesys_tagboard:/app/tesys_tagboard:z
    ports:
      - '9000:9000'
    command: /start-docs
