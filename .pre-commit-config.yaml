exclude: '^docs/|/migrations/|devcontainer.json'
default_stages: [pre-commit]
minimum_pre_commit_version: "3.2.0"

default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: check-builtin-literals
      - id: check-case-conflict
      - id: check-docstring-first
      - id: detect-private-key

  - repo: https://github.com/adamchainz/django-upgrade
    rev: '1.29.1'
    hooks:
      - id: django-upgrade
        args: ['--target-version', '5.2']

  # Run the Ruff linter hook
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      # Linter
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter
      - id: ruff-format

  # Run djlint hook
  - repo: https://github.com/Riverside-Healthcare/djLint
    rev: v1.36.4
    hooks:
      - id: djlint-reformat-django
      - id: djlint-django

  # Run rstcheck lint hook
  - repo: https://github.com/rstcheck/rstcheck
    rev: v6.2.5
    hooks:
      - id: rstcheck
        additional_dependencies: ['rstcheck[sphinx,toml]']

  # Tailwind class ordering commit hook
  # Credit to: Jeff Triplett (https://jefftriplett.com/2023/rustywind-pre-commit-hook/)
  - repo: local
    hooks:
      - id: rustywind
        name: rustywind Tailwind CSS class formatter
        language: node
        additional_dependencies:
          - rustywind@latest
        entry: rustywind
        args: [--write]
        types_or: [html]

  # Run taplo lint hook for toml file linting
  - repo: local
    hooks:
      - id: taplo-lint
        name: taplo-lint
        description: Lint TOML documents
        entry: taplo lint
        language: python
        types: [toml]
        args: [--default-schema-catalogs]
        require_serial: false
        additional_dependencies:
          - taplo
        minimum_pre_commit_version: "0"

# sets up .pre-commit-ci.yaml to ensure pre-commit dependencies stay up to date
ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false
