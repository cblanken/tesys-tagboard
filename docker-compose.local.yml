volumes:
  tesys_tagboard_local_postgres_data: {}
  tesys_tagboard_local_postgres_data_backups: {}


services:
  django:
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: tesys_tagboard_local_django
    container_name: tesys_tagboard_local_django
    depends_on:
      - postgres
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - path: ./.envs/.local/.postgres
        required: false
      - path: ./.envs/.local/.django
        required: false
      - path: ./.env
        required: false
    ports:
      - '55555:8000'
    command: /start
    profiles: [all]

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: tesys_tagboard_production_postgres
    container_name: tesys_tagboard_local_postgres
    ports:
      - '9876:5432'
    volumes:
      - tesys_tagboard_local_postgres_data:/var/lib/postgresql/data
      - tesys_tagboard_local_postgres_data_backups:/backups
    env_file:
      - path: ./.envs/.local/.postgres
        required: false
      - path: ./.env
        required: false
    profiles: [all, debug]

  mailpit:
    image: axllent/mailpit
    container_name: tesys_tagboard_local_mailpit
    restart: unless-stopped
    volumes:
        - ./mailpit_data:/data
    ports:
        - 8025:8025
        - 1025:1025
    environment:
        MP_MAX_MESSAGES: 5000
        MP_DATABASE: /data/mailpit.db
        MP_SMTP_AUTH_ACCEPT_ANY: 1
        MP_SMTP_AUTH_ALLOW_INSECURE: 1
