<div class="dropdown tag-container">
  <button tabindex="0"
          {% if actions %}role="button"{% endif %}
          type="button"
          style="{% if request.session.theme == 'dark' %}{% if category.dark_bg %}background: {{ category.dark_bg }};
                 {% endif %} {% if category.dark_fg %}color: {{ category.dark_fg }};{% endif %} {% elif request.session.theme == 'light' %} {% if category.light_bg %}background: {{ category.light_bg }};{% endif %} {% if category.light_fg %}color: {{ category.light_fg }};{% endif %} {% endif %}"
          class="btn {% if size == "xs" %}btn-xs{% elif size == "sm" %}btn-sm{% elif size == "lg" %}btn-lg{% else %}btn-md{% endif %}">
    <div class="inline-flex gap-1 items-center w-fit nowrap">
      {% if alias %}
        {% include "icons/feather.html" with icon="corner-down-right" %}
        <div class="font-bold">{{ alias.name }}</div>
        <div>{% include "icons/feather.html" with icon="arrow-right" %}</div>
      {% endif %}
      {% include "icons/feather.html" with icon="tag" %}
      <div>{{ tag.name }}</div>
    </div>
    <div>({{ tag.post_count }})</div>
    <input id="tag-{{ tag.pk }}"
           type="hidden"
           name="{{ tagset_name }}"
           value="{{ tag.pk }}" />
  </button>
  {% if actions %}
    <ul tabindex="-1"
        class="top-full mt-1 tag-actions dropdown-content bg-base-300 text-base-content">
      {% for action in actions %}
        {% include "tags/tag_action_list_item.html" with action=action %}
      {% endfor %}
    </ul>
  {% endif %}
</div>
