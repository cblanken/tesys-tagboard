{% load static custom_filters cache %}

{% get_static_prefix as STATIC_PREFIX %}
<label id="theme-picker" class="swap swap-rotate text-primary-content">
  <input type="checkbox"
         name="theme"
         class="hidden theme-controller"
         value="{% if request.session.theme != DEFAULT_THEME %}{{ DEFAULT_THEME }}{% else %}{{ ALTERNATE_THEME }}{% endif %}"
         hx-post="{% url 'toggle-theme' %}"
         hx-swap="none" />
  {% if request.session.theme == "dark" %}
    <svg class="swap-off feather {% if fill %}fill-current!{% endif %} size-8!">
      <use href="{{ STATIC_PREFIX }}icons/feather-sprite.svg#moon" />
    </svg>
    <svg class="swap-on feather {% if fill %}fill-current!{% endif %} size-8!">
      <use href="{{ STATIC_PREFIX }}icons/feather-sprite.svg#sun" />
    </svg>
  {% else %}
    <svg class="swap-off feather {% if fill %}fill-current!{% endif %} size-8!">
      <use href="{{ STATIC_PREFIX }}icons/feather-sprite.svg#sun" />
    </svg>
    <svg class="swap-on feather {% if fill %}fill-current!{% endif %} size-8!">
      <use href="{{ STATIC_PREFIX }}icons/feather-sprite.svg#moon" />
    </svg>
  {% endif %}
</label>
