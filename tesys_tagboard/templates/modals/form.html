<dialog id="modal_form_dialog"
        closedby="any"
        class="shadow-lg modal md:modal-middle">
  <div class="flex flex-col gap-3 min-w-fit bg-base-200 modal-box md:w-md md:min-w-md md:h-fit md:max-h-8/10">
    <div class="absolute top-2 right-2 m-0 modal-action">
      <form method="dialog">
        <button class="btn btn-error btn-square btn-soft">{% include "icons/feather.html" with icon="x" %}</button>
      </form>
    </div>
    <h2 class="px-4 w-full text-wrap-normal">{{ title }}</h2>
    {% partialdef form-body inline %}
    {% if body %}
      <form id="modal-form"
            class="flex overflow-auto relative flex-col pb-4"
            hx-indicator="#modal-form-spinner"
            hx-swap="outerHTML"
            {% if method == "DELETE" %}hx-delete="{{ action_url }}"{% else %}hx-post="{{ action_url }}"{% endif %}>
        {% csrf_token %}
        <!-- Messages for success or failure after form submission -->
        {% if modal_messages %}
          {% include "messages/message_list.html" with messages=modal_messages %}
        {% endif %}
        {{ body }}
      </form>
    {% endif %}
  {% endpartialdef form-body %}
  <button class="flex justify-center my-2 capitalize btn btn-lg {% if color == 'success' %}btn-success{% elif color == 'danger' %}btn-error{% else %}btn-primary{% endif %}"
          type="submit"
          form="modal-form">
    <div class="flex relative items-center">
      <div>{{ submit_btn_text|default:'submit' }}</div>
      <div class="absolute -right-9 w-6 aspect-square">
        <div id="modal-form-spinner"
             class="htmx-indicator loading loading-spinner size-10 text-info"></div>
      </div>
    </div>
  </button>
</div>
</dialog>
